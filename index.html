<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字符串引号处理工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h1>字符串处理</h1>
        
        <div class="input-section">
            <div class="textarea-wrapper">
                <textarea id="inputText" placeholder="请输入"></textarea>
                <span id="inputCount" class="count-badge">行数: 0</span>
            </div>
            
            <div class="action-row">
                <button id="processBtn" class="process-btn">确认</button>
                <button id="copyInputBtn" class="copy-btn" title="复制输入">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
                <div class="options-section">
                    <div class="quote-option">
                        <input type="radio" id="singleQuote" name="quoteType" value="single" checked>
                        <label for="singleQuote">单引号 (')</label>
                    </div>
                    <div class="quote-option">
                        <input type="radio" id="doubleQuote" name="quoteType" value="double">
                        <label for="doubleQuote">双引号 (")</label>
                    </div>
                    <div class="quote-option">
                        <input type="radio" id="commaOnly" name="quoteType" value="commaOnly">
                        <label for="commaOnly">只加逗号</label>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="output-section">
            <div class="output-header">
                <button id="copyOutputBtn" class="copy-btn" title="复制结果">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
                <button id="copyOutputInlineBtn" class="copy-btn" title="复制结果(去除换行)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
                <label for="outputText">处理结果:</label>
            </div>
            <div class="textarea-wrapper">
                <textarea id="outputText" class="output-text" readonly placeholder="处理结果将显示在这里..."></textarea>
                <span id="outputCount" class="count-badge">行数: 0</span>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script src="app.js"></script>
</body>
</html>
